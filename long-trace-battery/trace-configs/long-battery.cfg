# Long-trace battery capture — based on test/configs/long_trace.cfg upstream.
# Designed to run for hours-to-days. Periodic flush into the output file
# means the trace doesn't have to fit in a single in-memory buffer.
#
# For the demo this is set to 60 s; for a real 24-hour battery investigation
# bump duration_ms to 86_400_000 and increase file_write_period_ms to ~10_000.

write_into_file: true
file_write_period_ms: 2500
flush_period_ms: 5000
duration_ms: 60000

buffers { size_kb: 32768  fill_policy: RING_BUFFER }
buffers { size_kb: 8192   fill_policy: RING_BUFFER }

data_sources { config { name: "linux.process_stats" target_buffer: 1
  process_stats_config { scan_all_processes_on_start: true proc_stats_poll_ms: 10000 } } }

# Battery counters (current draw, charge level) sampled every 500 ms.
data_sources {
  config {
    name: "android.power"
    android_power_config {
      battery_poll_ms: 500
      collect_power_rails: true
      battery_counters: BATTERY_COUNTER_CAPACITY_PERCENT
      battery_counters: BATTERY_COUNTER_CHARGE
      battery_counters: BATTERY_COUNTER_CURRENT
    }
  }
}

# Suspend/resume + wakeup sources — the device-idle signals.
data_sources {
  config {
    name: "linux.ftrace"
    ftrace_config {
      ftrace_events: "power/suspend_resume"
      ftrace_events: "power/cpu_idle"
      ftrace_events: "power/cpu_frequency"
      ftrace_events: "power/wakeup_source_activate"
      ftrace_events: "power/wakeup_source_deactivate"
      ftrace_events: "sched/sched_switch"
      atrace_categories: "power"
      atrace_categories: "sched"
      atrace_apps: "com.example.perfetto.battery"
    }
  }
}
