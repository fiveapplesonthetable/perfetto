# Java heap analysis — captures BOTH data sources so the same trace can answer
# both "what's growing on the heap?" and "what's allocating?"
#
#  - android.java_hprof:        full heap snapshots (retention) every 2 s.
#  - android.heapprofd (art):   sampled allocation events with callstacks.
#
# References:
#   docs/data-sources/java-heap-profiler.md      — heap dumps
#   docs/data-sources/native-heap-profiler.md#java-heap-sampling — sampling
#
# Both require Android 12+. heapprofd-art targeting is set by `pid` at capture
# time; java_hprof matches by process_cmdline.

buffers { size_kb: 102400  fill_policy: RING_BUFFER }
buffers { size_kb: 8192    fill_policy: RING_BUFFER }

# Multi-snapshot heap dump — 5–6 snapshots over the 14 s window.
# heap_graph_object rows tagged with graph_sample_ts let you compute growth.
data_sources {
  config {
    name: "android.java_hprof"
    target_buffer: 0
    java_hprof_config {
      process_cmdline: "com.example.perfetto.heapalloc"
      continuous_dump_config {
        dump_phase_ms: 2000
        dump_interval_ms: 2000
      }
    }
  }
}

# Allocation sampling on the ART heap. May be flaky on cuttlefish (the test
# device); on real Android 12+ devices it produces a flamegraph rooted at
# the allocating method.
data_sources {
  config {
    name: "android.heapprofd"
    target_buffer: 0
    heapprofd_config {
      sampling_interval_bytes: 4096
      pid: 0                                   # set at capture time
      heaps: "com.android.art"
      continuous_dump_config {
        dump_phase_ms: 1000
        dump_interval_ms: 1000
      }
    }
  }
}

data_sources {
  config { name: "linux.process_stats" target_buffer: 1
    process_stats_config { scan_all_processes_on_start: true } }
}

duration_ms: 14000
