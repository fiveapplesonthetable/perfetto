# Java heap profile capture — based on test/configs/java_hprof.cfg upstream.
# continuous_dump_config takes a snapshot every dump_interval_ms; comparing
# successive snapshots is how you spot retention growth in real apps.

buffers { size_kb: 102400  fill_policy: RING_BUFFER }
buffers { size_kb: 8192    fill_policy: RING_BUFFER }

data_sources {
  config {
    name: "android.java_hprof"
    target_buffer: 0
    java_hprof_config {
      process_cmdline: "com.example.perfetto.heapalloc"
      continuous_dump_config {
        dump_phase_ms: 2000      # first dump 2 s after capture starts
        dump_interval_ms: 2000   # then every 2 s — gives 5–6 snapshots
      }
    }
  }
}

data_sources {
  config { name: "linux.process_stats" target_buffer: 1
    process_stats_config { scan_all_processes_on_start: true } }
}

data_sources {
  config {
    name: "linux.ftrace"
    ftrace_config {
      ftrace_events: "sched/sched_switch"
      atrace_categories: "view"
      atrace_apps: "com.example.perfetto.heapalloc"
    }
  }
}

duration_ms: 14000
