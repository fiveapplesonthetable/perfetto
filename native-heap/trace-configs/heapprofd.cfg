# Native heap profiling — based on test/configs/heapprofd.cfg upstream.
# heapprofd hooks malloc/free in the target process and emits a snapshot
# of every live allocation at each dump interval.
#
# IMPORTANT: targeting by process_cmdline can race the app's startup. The
# repro recipe in this tutorial uses `pid: <PID>` after `am start` to bind
# unambiguously. The two ways are equivalent once heapprofd has hooked the
# process; PID targeting is just easier to debug when something is off.
#
# Sampling at 4096 bytes is the perfetto-recommended default. 1 byte
# (record every allocation) overflows the trace buffer on a busy app.

buffers { size_kb: 102400  fill_policy: RING_BUFFER }
buffers { size_kb: 8192    fill_policy: RING_BUFFER }

data_sources {
  config {
    name: "android.heapprofd"
    target_buffer: 0
    heapprofd_config {
      sampling_interval_bytes: 4096
      pid: 0  # set at capture time; see README for the full recipe
      continuous_dump_config {
        dump_phase_ms: 0
        dump_interval_ms: 1000
      }
    }
  }
}

data_sources {
  config { name: "linux.process_stats" target_buffer: 1
    process_stats_config { scan_all_processes_on_start: true } }
}

duration_ms: 20000
